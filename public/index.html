<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0d0f">
<title>DEMIS</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230c0d0f'/><text x='50' y='72' text-anchor='middle' font-size='52' font-weight='700' fill='%23e00914'>D</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%230c0d0f'/><text x='90' y='125' text-anchor='middle' font-size='100' font-weight='700' fill='%23e00914'>D</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0d0f;--bg2:#141518;--bg3:#1c1d21;--bg4:#252629;
  --fg:#e8e6e1;--fg2:#a09d96;--fg3:#6b6862;
  --red:#e00914;--red-dim:#a0060e;--red-glow:rgba(224,9,20,.25);
  --radius:14px;--radius-sm:10px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --sidebar-w:280px;
}
[data-theme="light"]{
  --bg:#f5f4f1;--bg2:#eae8e4;--bg3:#dddbd6;--bg4:#d0cec8;
  --fg:#1a1a1a;--fg2:#5a5854;--fg3:#8a877f;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--fg);
  display:flex;height:100dvh;
  -webkit-tap-highlight-color:transparent;
}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--bg2);border-right:1px solid var(--bg3);
  display:flex;flex-direction:column;
  transition:margin-left .25s ease,opacity .25s ease;
  z-index:100;
}
.sidebar.collapsed{margin-left:calc(-1 * var(--sidebar-w));opacity:0;pointer-events:none}
.sidebar-header{
  padding:16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--bg3);
}
.sidebar-header h2{font-size:15px;font-weight:600;letter-spacing:.5px;color:var(--red)}
.sidebar-btn{
  background:none;border:none;color:var(--fg2);cursor:pointer;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-sm);transition:background .15s;font-size:18px;
}
.sidebar-btn:hover{background:var(--bg3)}
.new-chat-btn{
  margin:12px 16px;padding:10px;border-radius:var(--radius-sm);
  background:var(--red);color:#fff;border:none;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;
  transition:background .15s;
}
.new-chat-btn:hover{background:var(--red-dim)}
.conv-list{flex:1;overflow-y:auto;padding:8px}
.conv-list::-webkit-scrollbar{width:4px}
.conv-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.conv-item{
  padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:13px;color:var(--fg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:background .12s;display:flex;align-items:center;justify-content:space-between;
}
.conv-item:hover{background:var(--bg3)}
.conv-item.active{background:var(--bg3);color:var(--fg)}
.conv-item .delete-conv{
  display:none;background:none;border:none;color:var(--fg3);cursor:pointer;font-size:14px;
  padding:2px 4px;border-radius:4px;flex-shrink:0;
}
.conv-item:hover .delete-conv{display:block}
.conv-item .delete-conv:hover{color:var(--red)}
.sidebar-footer{
  padding:12px 16px;border-top:1px solid var(--bg3);
  display:flex;align-items:center;justify-content:space-between;
}
.theme-toggle{
  background:none;border:1px solid var(--bg4);color:var(--fg2);
  padding:6px 10px;border-radius:var(--radius-sm);cursor:pointer;
  font-family:inherit;font-size:12px;transition:background .15s;
}
.theme-toggle:hover{background:var(--bg3)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--bg3);flex-shrink:0;
}
.topbar .menu-btn{
  background:none;border:none;color:var(--fg2);cursor:pointer;font-size:20px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-sm);transition:background .15s;
}
.topbar .menu-btn:hover{background:var(--bg3)}
.topbar .title{font-size:16px;font-weight:600;letter-spacing:.3px}
.topbar .status{font-size:11px;color:var(--fg3);margin-left:auto}

/* ── MESSAGES ── */
.messages{
  flex:1;overflow-y:auto;padding:20px 16px;
  display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.msg{max-width:85%;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{
  align-self:flex-end;
  background:var(--red);color:#fff;
  padding:10px 14px;border-radius:var(--radius) var(--radius) 4px var(--radius);
  font-size:14px;line-height:1.5;
}
.msg.assistant{
  align-self:flex-start;
  background:var(--bg2);color:var(--fg);
  padding:12px 16px;border-radius:var(--radius) var(--radius) var(--radius) 4px;
  font-size:14px;line-height:1.6;
  position:relative;
}
/* Action bar under assistant messages */
.msg-actions{
  display:flex;align-items:center;gap:6px;margin-top:10px;
  position:relative;
}
.msg-actions button{
  display:inline-flex;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;
  color:var(--red);
  padding:6px;border-radius:6px;
  transition:background .15s,opacity .15s;
  opacity:0.8;
}
.msg-actions button:hover{background:var(--bg3);opacity:1}
.msg-actions button.playing{opacity:1;background:var(--red-glow)}
/* Copied tooltip */
.copied-tip{
  position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
  background:var(--red);color:#fff;font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:6px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .2s;
}
.copied-tip.show{opacity:1}
.msg.system{
  align-self:center;
  font-size:12px;color:var(--fg3);font-style:italic;
  background:var(--bg2);padding:6px 12px;border-radius:var(--radius-sm);
}
.msg.assistant pre{
  background:var(--bg);padding:10px 12px;border-radius:var(--radius-sm);
  overflow-x:auto;margin:8px 0;font-size:12.5px;
}
.msg.assistant code{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:13px}
.msg.assistant p{margin:4px 0}
.msg.assistant ul,.msg.assistant ol{margin:4px 0 4px 18px}
.msg.assistant strong{color:var(--red)}

/* ── THINKING WAVEFORM ── */
.thinking{
  align-self:flex-start;padding:16px 20px;
  display:flex;align-items:center;gap:3px;height:44px;
}
.thinking .bar{
  width:3px;height:16px;background:var(--red);border-radius:2px;
  animation:wave 1.2s ease-in-out infinite;
}
.thinking .bar:nth-child(2){animation-delay:.1s}
.thinking .bar:nth-child(3){animation-delay:.2s}
.thinking .bar:nth-child(4){animation-delay:.3s}
.thinking .bar:nth-child(5){animation-delay:.4s}
.thinking .bar:nth-child(6){animation-delay:.5s}
.thinking .bar:nth-child(7){animation-delay:.6s}
@keyframes wave{
  0%,100%{height:6px;opacity:.4}
  50%{height:22px;opacity:1}
}

/* ── INPUT ── */
.input-area{
  padding:12px 16px;padding-bottom:calc(12px + var(--safe-b));
  border-top:1px solid var(--bg3);flex-shrink:0;
  display:flex;align-items:flex-end;gap:10px;
  background:var(--bg);
}
.input-wrap{
  flex:1;display:flex;align-items:flex-end;
  background:var(--bg2);border:1px solid var(--bg4);
  border-radius:var(--radius);padding:4px;
  transition:border-color .15s;
}
.input-wrap:focus-within{border-color:var(--red)}
.input-wrap textarea{
  flex:1;background:none;border:none;outline:none;
  color:var(--fg);font-family:inherit;font-size:14px;
  padding:8px 10px;resize:none;
  max-height:120px;line-height:1.4;
}
.input-wrap textarea::placeholder{color:var(--fg3)}
.send-btn{
  width:42px;height:42px;border:none;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:background .15s,transform .1s;
  background:var(--red);color:#fff;
}
.send-btn:hover{background:var(--red-dim)}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.4;cursor:default;transform:none}

/* Mic button — large prominent red circle */
.mic-btn{
  width:48px;height:48px;border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  background:var(--red);color:#fff;
  transition:background .15s,transform .1s,box-shadow .2s;
  box-shadow:0 2px 8px var(--red-glow);
}
.mic-btn:hover{background:var(--red-dim);transform:scale(1.05)}
.mic-btn:active{transform:scale(.95)}
.mic-btn.recording{
  background:var(--red);color:#fff;
  animation:micPulse 1.5s ease-in-out infinite;
  box-shadow:0 0 0 0 var(--red-glow);
}
@keyframes micPulse{
  0%,100%{box-shadow:0 0 0 0 var(--red-glow)}
  50%{box-shadow:0 0 0 14px rgba(224,9,20,0)}
}

/* ── WELCOME ── */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px 20px;gap:12px;
}
.welcome h1{font-size:28px;font-weight:700;letter-spacing:1px;color:var(--red)}
.welcome p{font-size:14px;color:var(--fg2);max-width:320px;line-height:1.5}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);box-shadow:4px 0 24px rgba(0,0,0,.5)}
  .sidebar.collapsed{margin-left:calc(-1 * var(--sidebar-w))}
  .overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;
  }
  .overlay.show{display:block}
  .msg{max-width:92%}
}
@media(min-width:769px){
  .overlay{display:none!important}
}
</style>
</head>
<body>

<!-- OVERLAY (mobile sidebar backdrop) -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar collapsed" id="sidebar">
  <div class="sidebar-header">
    <h2>DEMIS</h2>
    <button class="sidebar-btn" onclick="toggleSidebar()" title="Close sidebar">&times;</button>
  </div>
  <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
  <div class="conv-list" id="convList"></div>
  <div class="sidebar-footer">
    <span style="font-size:12px;color:var(--fg3)">Anthony's Agent</span>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">Light</button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">&#9776;</button>
    <span class="title">DEMIS</span>
    <span class="status" id="statusText">Ready</span>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h1>DEMIS</h1>
      <p>Your personal AI agent. Type a message or tap the mic and say "Hey DEMIS" to begin.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Message DEMIS..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice input">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="1" width="6" height="12" rx="3"/>
        <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ── CONFIG ──
const SESSION_TOKEN = 'd1facb3daddf0b3621adfb1906612911b4e2473b229b5a659056d1b682dadb2b';
const ELEVENLABS_KEY = '86eb5abbafba6d1d0ef1c87250678af5484dd5b89fb916b844ce720c4828367b';
const ELEVENLABS_VOICE = 'uju3wxzG5OhpWcoi3SMy';
const ELEVENLABS_URL = `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE}`;
const WAKE_WORD = 'hey demis';

// SVG icons
const ICO_SPEAKER = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
const ICO_STOP = '<svg width="16" height="16" viewBox="0 0 24 24" fill="var(--red)" stroke="none"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>';
const ICO_COPY = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

// ── STATE ──
let conversations = JSON.parse(localStorage.getItem('demis_convos') || '{}');
let activeConvoId = null;
let currentMessages = [];
let isStreaming = false;

// TTS state
let audioCtx = null;
let currentSource = null;
let currentAudioEl = null;
let ttsPlaying = false;
let ttsPlayingMsgIndex = null;

// ── ELEMENTS ──
const $msgs      = document.getElementById('messages');
const $input     = document.getElementById('input');
const $sendBtn   = document.getElementById('sendBtn');
const $micBtn    = document.getElementById('micBtn');
const $sidebar   = document.getElementById('sidebar');
const $overlay   = document.getElementById('overlay');
const $convList  = document.getElementById('convList');
const $welcome   = document.getElementById('welcome');
const $status    = document.getElementById('statusText');
const $themeBtn  = document.getElementById('themeBtn');

// ── THEME ──
function initTheme() {
  const t = localStorage.getItem('demis_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  $themeBtn.textContent = t === 'dark' ? 'Light' : 'Dark';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('demis_theme', next);
  $themeBtn.textContent = next === 'dark' ? 'Light' : 'Dark';
}
initTheme();

// ── SIDEBAR ──
function toggleSidebar() {
  $sidebar.classList.toggle('collapsed');
  $overlay.classList.toggle('show');
}
function renderConvList() {
  const ids = Object.keys(conversations).sort((a, b) => (conversations[b].ts || 0) - (conversations[a].ts || 0));
  $convList.innerHTML = ids.map(id => {
    const c = conversations[id];
    const label = c.label || 'New Chat';
    const cls = id === activeConvoId ? ' active' : '';
    return `<div class="conv-item${cls}" onclick="loadConvo('${id}')">
      <span style="overflow:hidden;text-overflow:ellipsis">${esc(label)}</span>
      <button class="delete-conv" onclick="event.stopPropagation();deleteConvo('${id}')">&times;</button>
    </div>`;
  }).join('');
}
function saveConversations() {
  localStorage.setItem('demis_convos', JSON.stringify(conversations));
  renderConvList();
}

// ── CONVERSATION MANAGEMENT ──
function newChat() {
  activeConvoId = 'c_' + Date.now();
  currentMessages = [];
  conversations[activeConvoId] = { label: 'New Chat', messages: [], ts: Date.now() };
  saveConversations();
  renderMessages();
  if (window.innerWidth < 769) toggleSidebar();
  $input.focus();
}
function loadConvo(id) {
  activeConvoId = id;
  const c = conversations[id];
  currentMessages = c ? [...c.messages] : [];
  renderMessages();
  saveConversations();
  if (window.innerWidth < 769) toggleSidebar();
}
function deleteConvo(id) {
  delete conversations[id];
  if (activeConvoId === id) {
    activeConvoId = null;
    currentMessages = [];
    renderMessages();
  }
  saveConversations();
}
function persistCurrentConvo() {
  if (!activeConvoId) return;
  conversations[activeConvoId].messages = currentMessages;
  conversations[activeConvoId].ts = Date.now();
  if (currentMessages.length && conversations[activeConvoId].label === 'New Chat') {
    const first = currentMessages.find(m => m.role === 'user');
    if (first) conversations[activeConvoId].label = first.content.slice(0, 50);
  }
  saveConversations();
}

// ── ACTION BUTTONS HTML ──
function actionBtnsHtml(msgIndex) {
  const isPlaying = ttsPlaying && ttsPlayingMsgIndex === msgIndex;
  const speakerIco = isPlaying ? ICO_STOP : ICO_SPEAKER;
  const speakerCls = isPlaying ? ' playing' : '';
  const speakerTitle = isPlaying ? 'Stop' : 'Read aloud';
  return `<div class="msg-actions">
    <button class="speaker-btn${speakerCls}" data-msg="${msgIndex}" onclick="toggleSpeak(${msgIndex})" title="${speakerTitle}">${speakerIco}</button>
    <button class="copy-btn" data-msg="${msgIndex}" onclick="copyMsg(${msgIndex})" title="Copy"><span class="copied-tip">Copied!</span>${ICO_COPY}</button>
  </div>`;
}

// ── RENDER ──
function renderMessages() {
  const welcome = currentMessages.length === 0;
  $msgs.innerHTML = welcome
    ? `<div class="welcome"><h1>DEMIS</h1><p>Your personal AI agent. Type a message or tap the mic and say "Hey DEMIS" to begin.</p></div>`
    : currentMessages.map((m, i) => {
        if (m.role === 'user') return `<div class="msg user">${esc(m.content)}</div>`;
        if (m.role === 'assistant') return `<div class="msg assistant" data-msgidx="${i}"><div class="msg-body">${formatMd(m.content)}</div>${actionBtnsHtml(i)}</div>`;
        return `<div class="msg system">${esc(m.content)}</div>`;
      }).join('');
  scrollBottom();
}
function scrollBottom() {
  requestAnimationFrame(() => $msgs.scrollTop = $msgs.scrollHeight);
}

// Update speaker button state without full re-render
function updateSpeakerBtn(msgIndex, playing) {
  const btn = document.querySelector(`.speaker-btn[data-msg="${msgIndex}"]`);
  if (!btn) return;
  if (playing) {
    btn.classList.add('playing');
    btn.innerHTML = ICO_STOP;
    btn.title = 'Stop';
  } else {
    btn.classList.remove('playing');
    btn.innerHTML = ICO_SPEAKER;
    btn.title = 'Read aloud';
  }
}

// ── MARKDOWN (light) ──
function formatMd(text) {
  let h = esc(text);
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/\n/g, '<br>');
  return h;
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── STRIP TEXT FOR TTS ──
function stripForTTS(text) {
  return text
    .replace(/```[\s\S]*?```/g, '')
    .replace(/`[^`]+`/g, '')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/#{1,6}\s*/g, '')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/\n+/g, ' ')
    .trim();
}

// ── INPUT ──
$input.addEventListener('input', () => {
  $sendBtn.disabled = !$input.value.trim() || isStreaming;
});
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── SEND ──
async function sendMessage(text) {
  const msg = text || $input.value.trim();
  if (!msg || isStreaming) return;
  if (!activeConvoId) newChat();

  $input.value = '';
  $input.style.height = 'auto';
  $sendBtn.disabled = true;

  currentMessages.push({ role: 'user', content: msg });
  renderMessages();

  // Show thinking
  const thinkEl = document.createElement('div');
  thinkEl.className = 'thinking';
  thinkEl.innerHTML = '<div class="bar"></div>'.repeat(7);
  $msgs.appendChild(thinkEl);
  scrollBottom();

  isStreaming = true;
  $status.textContent = 'Thinking...';

  const apiMessages = currentMessages.map(m => ({ role: m.role, content: m.content }));
  let fullText = '';
  const asstMsgIndex = currentMessages.length;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-session-token': SESSION_TOKEN,
      },
      body: JSON.stringify({ messages: apiMessages }),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    thinkEl.remove();
    const asstEl = document.createElement('div');
    asstEl.className = 'msg assistant';
    asstEl.setAttribute('data-msgidx', asstMsgIndex);
    $msgs.appendChild(asstEl);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const evt = JSON.parse(data);
          if (evt.type === 'text') {
            fullText += evt.text;
            asstEl.innerHTML = `<div class="msg-body">${formatMd(fullText)}</div>${actionBtnsHtml(asstMsgIndex)}`;
            scrollBottom();
          } else if (evt.type === 'planning') {
            $status.textContent = 'Planning...';
          } else if (evt.type === 'task_resume') {
            $status.textContent = `Running: ${evt.label}`;
          } else if (evt.type === 'task_blocked') {
            fullText += `\n[Task blocked: ${evt.reason}]`;
            asstEl.innerHTML = `<div class="msg-body">${formatMd(fullText)}</div>${actionBtnsHtml(asstMsgIndex)}`;
          } else if (evt.type === 'memory_set' || evt.type === 'memory_cleared') {
            fullText += `[Memory updated]`;
            asstEl.innerHTML = `<div class="msg-body">${formatMd(fullText)}</div>${actionBtnsHtml(asstMsgIndex)}`;
          }
        } catch (_) {}
      }
    }

    if (fullText) {
      currentMessages.push({ role: 'assistant', content: fullText });
    }
  } catch (err) {
    thinkEl.remove();
    currentMessages.push({ role: 'assistant', content: `Connection error: ${err.message}` });
    renderMessages();
  }

  isStreaming = false;
  $status.textContent = 'Ready';
  $sendBtn.disabled = !$input.value.trim();
  persistCurrentConvo();
}

// ── STOP TTS ──
function stopTTS() {
  console.log('[TTS] stopTTS() called');
  if (currentSource) {
    try { currentSource.stop(); } catch (_) {}
    currentSource = null;
  }
  if (currentAudioEl) {
    currentAudioEl.pause();
    currentAudioEl = null;
  }
  if (audioCtx && audioCtx.state !== 'closed') {
    audioCtx.close().catch(() => {});
    audioCtx = null;
  }
  window.speechSynthesis?.cancel();
  if (ttsPlayingMsgIndex !== null) {
    updateSpeakerBtn(ttsPlayingMsgIndex, false);
  }
  ttsPlaying = false;
  ttsPlayingMsgIndex = null;
}

// ── TOGGLE SPEAK (play or stop) ──
function toggleSpeak(msgIndex) {
  if (ttsPlaying && ttsPlayingMsgIndex === msgIndex) {
    stopTTS();
    return;
  }
  const msg = currentMessages[msgIndex];
  if (!msg || msg.role !== 'assistant') return;
  const text = stripForTTS(msg.content);
  if (!text) return;
  speakText(text, msgIndex);
}

// ── CORE TTS: ElevenLabs with AudioContext ──
async function speakText(text, msgIndex) {
  // Stop any current playback first
  stopTTS();

  ttsPlaying = true;
  ttsPlayingMsgIndex = msgIndex;
  updateSpeakerBtn(msgIndex, true);

  const truncated = text.slice(0, 2500);
  console.log('[TTS] speakText() called, msgIndex:', msgIndex);
  console.log('[TTS] Text length:', text.length, '| Truncated to:', truncated.length);
  console.log('[TTS] First 120 chars:', truncated.slice(0, 120));
  console.log('[TTS] ElevenLabs URL:', ELEVENLABS_URL);
  console.log('[TTS] API key (first 8):', ELEVENLABS_KEY.slice(0, 8) + '...');
  console.log('[TTS] Voice ID:', ELEVENLABS_VOICE);

  const reqBody = {
    text: truncated,
    model_id: 'eleven_monolingual_v1',
    voice_settings: { stability: 0.5, similarity_boost: 0.75 },
  };
  console.log('[TTS] Request body:', JSON.stringify(reqBody).slice(0, 200));

  try {
    console.log('[TTS] Fetching from ElevenLabs...');
    const t0 = performance.now();
    const resp = await fetch(ELEVENLABS_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'xi-api-key': ELEVENLABS_KEY,
      },
      body: JSON.stringify(reqBody),
    });
    const elapsed = (performance.now() - t0).toFixed(0);
    console.log(`[TTS] ElevenLabs responded in ${elapsed}ms — status: ${resp.status} ${resp.statusText}`);
    console.log('[TTS] Response headers:', [...resp.headers.entries()].map(([k,v]) => `${k}: ${v}`).join(', '));

    if (!resp.ok) {
      const errText = await resp.text();
      console.error('[TTS] ElevenLabs error response body:', errText);
      throw new Error(`ElevenLabs HTTP ${resp.status}: ${errText}`);
    }

    console.log('[TTS] Reading response as arrayBuffer...');
    const arrayBuf = await resp.arrayBuffer();
    console.log('[TTS] ArrayBuffer size:', arrayBuf.byteLength, 'bytes');

    if (arrayBuf.byteLength < 100) {
      console.error('[TTS] ArrayBuffer suspiciously small, dumping first bytes:', new Uint8Array(arrayBuf.slice(0, 50)));
      throw new Error('ElevenLabs returned tiny response');
    }

    // Decode with AudioContext
    console.log('[TTS] Creating AudioContext and decoding audio...');
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
    console.log('[TTS] Audio decoded — duration:', audioBuf.duration.toFixed(1) + 's, sampleRate:', audioBuf.sampleRate);

    // Check if we were stopped while waiting
    if (!ttsPlaying) {
      console.log('[TTS] Playback was cancelled during decode');
      audioCtx.close().catch(() => {});
      audioCtx = null;
      return;
    }

    currentSource = audioCtx.createBufferSource();
    currentSource.buffer = audioBuf;
    currentSource.connect(audioCtx.destination);
    currentSource.onended = () => {
      console.log('[TTS] ElevenLabs playback ended naturally');
      stopTTS();
    };
    currentSource.start(0);
    console.log('[TTS] ElevenLabs playback STARTED via AudioContext');
    return;

  } catch (err) {
    console.warn('[TTS] ElevenLabs failed:', err.message);
    console.warn('[TTS] Full error:', err);
  }

  // ── FALLBACK: browser speech synthesis ──
  if ('speechSynthesis' in window) {
    console.log('[TTS] Falling back to browser speechSynthesis');
    const utter = new SpeechSynthesisUtterance(text.slice(0, 1000));
    utter.rate = 1.05;
    utter.pitch = 1;
    utter.onend = () => {
      console.log('[TTS] Browser TTS ended');
      stopTTS();
    };
    utter.onerror = (e) => {
      console.error('[TTS] Browser TTS error:', e.error);
      stopTTS();
    };
    window.speechSynthesis.speak(utter);
    console.log('[TTS] Browser TTS started');
  } else {
    console.error('[TTS] No TTS engine available at all');
    stopTTS();
  }
}

// ── COPY MESSAGE ──
function copyMsg(msgIndex) {
  const msg = currentMessages[msgIndex];
  if (!msg) return;
  navigator.clipboard.writeText(msg.content).then(() => {
    console.log('[COPY] Message copied to clipboard, index:', msgIndex);
    const btn = document.querySelector(`.copy-btn[data-msg="${msgIndex}"]`);
    if (!btn) return;
    const tip = btn.querySelector('.copied-tip');
    if (tip) {
      tip.classList.add('show');
      setTimeout(() => tip.classList.remove('show'), 2000);
    }
  }).catch(err => {
    console.error('[COPY] Failed:', err);
  });
}

// ── DOUBLE-TAP TO READ FROM POSITION ──
$msgs.addEventListener('dblclick', (e) => {
  // Find the parent assistant message
  const msgEl = e.target.closest('.msg.assistant');
  if (!msgEl) return;
  const msgIndex = parseInt(msgEl.getAttribute('data-msgidx'), 10);
  if (isNaN(msgIndex)) return;
  const msg = currentMessages[msgIndex];
  if (!msg || msg.role !== 'assistant') return;

  // Get the word at the click position
  let range = null;
  if (document.caretRangeFromPoint) {
    range = document.caretRangeFromPoint(e.clientX, e.clientY);
  } else if (document.caretPositionFromPoint) {
    const pos = document.caretPositionFromPoint(e.clientX, e.clientY);
    if (pos) {
      range = document.createRange();
      range.setStart(pos.offsetNode, pos.offset);
      range.collapse(true);
    }
  }

  if (!range || !range.startContainer || range.startContainer.nodeType !== Node.TEXT_NODE) {
    console.log('[TTS] Double-tap: could not find text node, reading from start');
    const text = stripForTTS(msg.content);
    if (text) speakText(text, msgIndex);
    return;
  }

  // Get the full text content and find the word offset
  const textNode = range.startContainer;
  const offset = range.startOffset;
  const nodeText = textNode.textContent;

  // Find word boundary
  let wordStart = offset;
  while (wordStart > 0 && nodeText[wordStart - 1] !== ' ') wordStart--;

  // Now get all text from this node onward within the msg-body
  const body = msgEl.querySelector('.msg-body');
  if (!body) return;
  const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT, null);
  let found = false;
  let remainingText = '';

  while (walker.nextNode()) {
    if (walker.currentNode === textNode) {
      remainingText += nodeText.slice(wordStart);
      found = true;
    } else if (found) {
      remainingText += ' ' + walker.currentNode.textContent;
    }
  }

  remainingText = remainingText.trim();
  if (!remainingText) {
    console.log('[TTS] Double-tap: no remaining text found');
    return;
  }

  console.log('[TTS] Double-tap read from position — first 80 chars:', remainingText.slice(0, 80));
  e.preventDefault();
  window.getSelection()?.removeAllRanges();
  speakText(remainingText, msgIndex);
});

// ── VOICE INPUT (Web Speech API) ──
let recognition = null;
let isRecording = false;

function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    console.warn('[MIC] SpeechRecognition API not available');
    return;
  }
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript.trim();
    console.log('[MIC] Transcript:', transcript);
    stopRecording();
    if (!transcript) return;

    let msg = transcript;
    const lower = msg.toLowerCase();
    if (lower.startsWith(WAKE_WORD)) {
      msg = msg.slice(WAKE_WORD.length).trim();
    }
    if (msg) {
      $input.value = msg;
      sendMessage(msg);
    }
  };
  recognition.onerror = (e) => {
    console.error('[MIC] Recognition error:', e.error);
    stopRecording();
  };
  recognition.onend = () => {
    console.log('[MIC] Recognition ended');
    stopRecording();
  };
  console.log('[MIC] SpeechRecognition initialized');
}
function toggleMic() {
  if (isRecording) { stopRecording(); return; }
  if (!recognition) initSpeech();
  if (!recognition) {
    console.error('[MIC] Cannot start — SpeechRecognition not supported');
    alert('Speech recognition is not supported in this browser');
    return;
  }
  isRecording = true;
  $micBtn.classList.add('recording');
  $status.textContent = 'Listening...';
  console.log('[MIC] Starting recognition...');
  try {
    recognition.start();
  } catch (err) {
    console.error('[MIC] Failed to start:', err);
    stopRecording();
  }
}
function stopRecording() {
  isRecording = false;
  $micBtn.classList.remove('recording');
  $status.textContent = 'Ready';
  try { recognition?.stop(); } catch (_) {}
}
initSpeech();

// ── INIT ──
renderConvList();
const ids = Object.keys(conversations);
if (ids.length) {
  const latest = ids.sort((a, b) => (conversations[b].ts || 0) - (conversations[a].ts || 0))[0];
  loadConvo(latest);
} else {
  renderMessages();
}
$input.focus();
console.log('[DEMIS] Frontend loaded');
console.log('[DEMIS] ElevenLabs URL:', ELEVENLABS_URL);
console.log('[DEMIS] ElevenLabs key present:', !!ELEVENLABS_KEY, '| length:', ELEVENLABS_KEY.length);
console.log('[DEMIS] Voice ID:', ELEVENLABS_VOICE);
console.log('[DEMIS] Mic available:', !!recognition);

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e => console.warn('[SW] Registration failed:', e));
}
